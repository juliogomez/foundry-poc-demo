id: codeguard-py-hardcoded-secret
description: |
  Detect credentials/secrets/keys assigned as literals in source instead of
  being read from env/secret manager. Maps to CWE-798 (Use of Hard-coded
  Credentials).
languages: [python]
severity: medium
weakness_class: CWE-798
applies_to:
  - assignments to names containing password/secret/token/api_key/private_key
  - default parameter values or module-level constants holding such literals
trigger_when:
  - the value is a non-empty string/bytes literal (not read from os.environ,
    a secrets manager, or a config injected at runtime)
  - and the value is not an obvious placeholder ("", "changeme", "<...>")
example_positive: |
  SECRET_KEY = "9f8a7b6c5d4e3f2a1b0c9d8e7f6a5b4c"   # high-entropy literal, not from env
example_negative: |
  SECRET_KEY = os.environ["SECRET_KEY"]
